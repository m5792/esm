<script>
/* ================= USER CODE MAP and Rol Difine Buttan Hide/Unhide================= */
const userCodeMap = {

  "Mukhtar (Admin)": "MA",
  "Suryabhan": "SUR10",

   "NITIN": "NIT17"
};


/* ================= DROPDOWN CONTROL ================= */
function updateUserDropdown(username) {

  document.querySelectorAll("select.usercodedp").forEach(select => {

    if (select.dataset.loaded === "yes") return;

    select.innerHTML = "";
    let options = [];

    if (username === "Mukhtar (Admin)") {
      options = ["MA","GK","SUR10","DIV11","HAR12","PRA13","RAH14","RAH15","VIR16","NIT17"];
    } 
    else if (username === "Gurpreet") {
      options = ["SUR10","DIV11"];
    } 
    else if (userCodeMap[username]) {
      options = [userCodeMap[username]];
    }

    options.forEach(val => {
      let opt = document.createElement("option");
      opt.value = val;
      opt.textContent = val;
      select.appendChild(opt);
    });

    select.dataset.loaded = "yes";
  });
}


/* ================= INPUT AUTOFILL ================= */
function updateUserBasedInputs(username) {

  const userCode = userCodeMap[username];

  // usercode input
  if (userCode) {
    document.querySelectorAll("input.usercode").forEach(input => {
      if (!input.value) input.value = userCode;
    });
  }

  // username input
  document.querySelectorAll("input.username").forEach(input => {
    if (!input.value) input.value = username;
  });

  // dropdown
  updateUserDropdown(username);

  // readonly control
  updateReadonlyInputs(username);
}


/* ================= BUTTON PERMISSION ================= */
function updateButtonPermissions() {

  const authEl = document.getElementById("reportauth");
  if (!authEl) return;

  const authValues = authEl.textContent
    .split(",")
    .map(v => v.trim());

  document.querySelectorAll("[mfvbtn]").forEach(btn => {

    const btnCode = btn.getAttribute("mfvbtn");

    if (authValues.includes(btnCode)) {
      btn.style.display = "";
    } else {
      btn.style.display = "none";
    }
  });
}


/* ================= STATE ================= */
let currentUsername = "";


/* ================= USERNAME + AUTH MONITOR ================= */
setInterval(() => {

  const usernameEl = document.getElementById("username");
  const authEl = document.getElementById("reportauth");

  /* Username change detect */
  if (usernameEl) {
    const newUsername = usernameEl.textContent.trim();

    if (newUsername && newUsername !== currentUsername) {
      currentUsername = newUsername;
      updateUserBasedInputs(currentUsername);

      setTimeout(updateButtonPermissions, 300);
    }
  }

  /* Agar reportauth dynamic load ho */
  if (authEl && authEl.textContent.trim()) {
    updateButtonPermissions();
  }

}, 500);


/* ================= FORM RESET SUPPORT ================= */
document.addEventListener("reset", function() {
  setTimeout(() => {

    document.querySelectorAll("select.usercodedp")
      .forEach(s => s.dataset.loaded = "");

    if (currentUsername) {
      updateUserBasedInputs(currentUsername);
    }

  }, 200);
}, true);


/* ================= INPUT READONLY CONTROL ================= */
/* ================= INPUT READONLY CONTROL ================= */
function updateReadonlyInputs(username) {

  const inputs = document.querySelectorAll("input.inputhide");

  inputs.forEach(input => {

    if (username === "Mukhtar (Admin)") {

      input.removeAttribute("readonly");
      input.style.background = "";

    } else {

      input.setAttribute("readonly", true);

      if (!input.value.trim()) {
        input.value = "-";
        input.style.background = "#ffd6d6"; // light red
      }

    }

  });
}
/* ================= INITIAL SAFETY ================= */
/* Page load par sab restricted button hide */
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll("[mfvbtn]").forEach(btn => {
    btn.style.display = "none";
  });
});

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ================= GOOGLE APPS SCRIPT URL ================= */
  const scriptURL = "https://script.google.com/macros/s/AKfycbxDE9qiutBDF5nPy-mpmNKioOT9LjGEvzFJ6hSL_HUSTaggNHCvarTgM5OZ3iPrf6WQOQ/exec";

  /* ================= WAIT POPUP ================= */
  const popupHTML = `
  <div id="waitMFFOverlay" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    z-index:9999;
    align-items:center;
    justify-content:center;">
    <div style="
      background:#fff;
      padding:20px 30px;
      border-radius:10px;
      min-width:250px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.3);
      font-size:16px;
      font-weight:600;">
      ⏳ <span id="waitMsg">Please wait...</span>
    </div>
  </div>`;
  document.body.insertAdjacentHTML("beforeend", popupHTML);

  const showWait = (msg) => {
    document.getElementById("waitMsg").innerText = msg;
    document.getElementById("waitMFFOverlay").style.display = "flex";
  };

  const hideWait = () => {
    document.getElementById("waitMFFOverlay").style.display = "none";
  };

  /* ================= MULTI FORM ================= */
  const forms = document.querySelectorAll(".mainSRRForm");

  /* ================= MODIFY ================= */
  forms.forEach(form => {

    const sNo = form.querySelector("#sNo");
    const submitBtn = form.querySelector("#submitSRRButton");
    const deleteBtn = form.querySelector("#deleteMButton");
    const newBtn = form.querySelector("#newEntryMButton");
    const modifyBtn = form.querySelector("#openMODIFYButton");
    const srSpan = form.closest(".multiform-container").querySelector("#srNoSpan");

    /* ========= MODIFY FETCH ========= */
    modifyBtn.onclick = async () => {

      const sr = prompt("Enter SR No");
      if (!sr) return;

      const sheet = form.querySelector("#datasheetname").value;
      const usercode = form.querySelector("#msaf90").value;

      showWait("Fetching data...");

      try {

        const res = await fetch(`${scriptURL}?sNo=${sr}&Usercode=${usercode}&datasheetname=${sheet}`);
        const d = await res.json();

        if (d.result === "unauthorized") {
          alert(`You are not authorized. Contact "${d.owner}" User`);
          return;
        }

        if (d.result !== "success") {
          alert("Record not found");
          return;
        }

        sNo.value = d.SNo;
        srSpan.innerText = d.SNo;

        form.querySelector("#msaf90").value = d.Usercode || "";
        form.querySelector("#msaf91").value = d.Voucher || "";
        form.querySelector("#DpSRRSearch").value = d.Ledger || "";
        form.querySelector("#msaf92").value = d.Date || "";
        form.querySelector("#msaf93").value = d.cl1 || "";
        form.querySelector("#msaf94").value = d.cl2 || "";
        form.querySelector("#msaf95").value = d.cl3 || "";
        form.querySelector("#msaf96").value = d.cl4 || "";
        form.querySelector("#msaf97").value = d.cl5 || "";
        form.querySelector("#msaf98").value = d.cl6 || "";
        form.querySelector("#msaf99").value = d.cl7 || "";

        deleteBtn.style.display = "inline-block";
        newBtn.style.display = "inline-block";

/* 🔥 multiformTable refresh */
if(typeof loadActiveTable === "function"){
   loadActiveTable();
}

      } catch (err) {
        alert("Fetch error");
      } finally {
        hideWait();
      }
    };

    /* ========= DELETE ========= */
    deleteBtn.onclick = async () => {

      if (!sNo.value) {
        alert("No record selected");
        return;
      }

      if (!confirm("Delete this entry?")) return;

      const sheet = form.querySelector("#datasheetname").value;
      const usercode = form.querySelector("#msaf90").value;

      showWait("Deleting...");

      try {

        const res = await fetch(
          `${scriptURL}?action=delete&SNo=${sNo.value}&Usercode=${usercode}&datasheetname=${sheet}`
        );

        const r = await res.json();

        if (r.result === "success") {
          alert("Deleted Successfully");
          resetForm(form);

          /* 🔥 multiformTable refresh */
if(typeof loadActiveTable === "function"){
   loadActiveTable();
}

        } else {
          alert("Delete Failed");
        }

      } catch {
        alert("Delete error");
      } finally {
        hideWait();
      }
    };

    /* ========= SUBMIT ========= */
    form.onsubmit = async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.value = "Please wait...";
      showWait("Saving...");

      try {

        const fd = new FormData(form);

/* 🔥 DATE FORMAT CHANGE */
    form.querySelectorAll("input[type='date']").forEach(input=>{
      if(input.value){
        const d = new Date(input.value);

        const day = String(d.getDate()).padStart(2,"0");
        const month = d.toLocaleString("en-GB",{month:"short"});
        const year = d.getFullYear();

        const formatted = `${day}-${month}-${year}`;

        fd.set(input.name, formatted);
      }
    });
//---------
        if (sNo.value.trim() !== "") {
          fd.set("action", "modify");
          fd.set("SNo", sNo.value);
        } else {
          fd.set("action", "submit");
        }

        const res = await fetch(scriptURL, {
          method: "POST",
          body: fd
        });

        const r = await res.json();

        if (r.result === "success") {
          alert("Saved Successfully");
          resetForm(form);

          /* 🔥 multiformTable refresh */
if(typeof loadActiveTable === "function"){
   loadActiveTable();
}

        } else {
          alert("Save Failed");
        }

      } catch {
        alert("Submit error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.value = "Submit";
        hideWait();
      }
    };

    /* ========= NEW ========= */
    newBtn.onclick = () => resetForm(form);

    function resetForm(form) {
      form.reset();
      sNo.value = "";
      srSpan.innerText = "";
      deleteBtn.style.display = "none";
      newBtn.style.display = "none";
    }

    deleteBtn.style.display = "none";
    newBtn.style.display = "none";

  });

});
</script>

  DATAA:["SNo","User","Status","Date","Party","Type","Vcr. Type","Doc No.","Weight","Item Details | Narration","Vehicle No"],
  DATAB:["SNo","User","Voucher","Date","Ledger","Weight","Rate","Amount","Doc. No.","Narration"],
  DATAC:["SNo","User","Tr. Type","Date","Ledger","Amount","Narration","Balance"],
  DATAD:["SNo","Voucher","V. Type","Date","Ledger","Vcr No/Amt.","Reff/PO","Amount","Weight","Rate","Vehicle/Narration","User"],
  DATAE:["SNo","User","Status","Creat By","Party","Amount","Reff/UTR No.","Narration"],
  DATAF:["SNo","User","Status","Clint Name","Project Name","Address","JOB/Reff","PO Amount","PO Weight","Order By"],
  ADMIN:["SNo","User","Y/N","UserID","Password","Status","User Name","User Code","Vcr Permission"]
};

/* ================= GLOBAL CACHE ================= */
let ledgerList = [];
let reffPOList = [];
let selectedMFTLedger = "";
let selectedReffPO = "";
let sheetCache = [];
let ledgerIndex = -1;
let reffIndex = -1;


/* ================= GLOBAL OUTSIDE CLICK ================= */
document.addEventListener("click", function(e){

  const activeForm = getActiveForm();
  if(!activeForm) return;

  const ledgerInput = activeForm.querySelector("#DpSRRSearch");
  const ledgerDrop = activeForm.querySelector(".ledgerDropdown");

  const reffInput = activeForm.querySelector("#msaf94");
  const reffDrop = activeForm.querySelector(".reffPODropdown");

  /* ===== LEDGER ===== */

  if(ledgerDrop && ledgerDrop.style.display === "block"){
    if(!ledgerInput?.contains(e.target) && !ledgerDrop.contains(e.target)){

      ledgerDrop.style.display = "none";

      if(ledgerInput.value !== selectedMFTLedger){

        if(ledgerList.includes(ledgerInput.value)){
          selectedMFTLedger = ledgerInput.value;
        }
        else{
          ledgerInput.value = "";
        }

      }

    }
  }

  /* ===== REFF ===== */

  if(reffDrop && reffDrop.style.display === "block"){
    if(!reffInput?.contains(e.target) && !reffDrop.contains(e.target)){

      reffDrop.style.display = "none";

      if(reffInput.value !== selectedReffPO){

        if(reffPOList.includes(reffInput.value)){
          selectedReffPO = reffInput.value;
        }
        else{
          reffInput.value = "";
        }

      }

    }
  }

});

/* ================= GET ACTIVE FORM ================= */
function getActiveForm(){
  return document.querySelector("#formsWrapper .active-form .mainSRRForm");
}

/* ================= LOAD TABLE ================= */
async function loadActiveTable(){

  const activeForm = getActiveForm();
  if(!activeForm) return;

  const sheetName = activeForm.querySelector("[name='datasheetname']")?.value;
  if(!sheetName) return;

  const range = sheetName + "!A:Z";
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${multiformId}/values/${range}?key=${multiformKey}`;

  try{
    const res = await fetch(url);
    const data = await res.json();
    let rows = data.values || [];

    sheetCache = rows;

    applySheetFilters(sheetName, rows);

    createTable(sheetName, rows);
    loadLedgerList(rows);
    loadReffPOList(rows);

  }catch(e){
    console.error("Error loading table:", e);
  }

}

/* ================= SHEET FILTER ================= */
function applySheetFilters(sheetName, rows){

  if(rows.length <= 1) return;

  const header = rows[0];
  let body = rows.slice(1);

  const searchValue = document.getElementById("searchMFTInput")?.value.toLowerCase() || "";
  const startDate = document.getElementById("startMFTDate")?.value;
  const endDate   = document.getElementById("endMFTDate")?.value;

  const filterActive = searchValue || startDate || endDate;

  if(searchValue){
    body = body.filter(row => row.some(cell => (cell||"").toLowerCase().includes(searchValue)));
  }

  if(startDate || endDate){
    body = body.filter(row => {

      const rowDate = new Date(row[3] || "");
      if(!rowDate) return false;

      if(startDate){
        const from = new Date(startDate);
        from.setHours(0,0,0,0);
        if(rowDate < from) return false;
      }

      if(endDate){
        const to = new Date(endDate);
        to.setHours(23,59,59,999);
        if(rowDate > to) return false;
      }

      return true;

    });
  }

 /* ===== SORT ALWAYS DESCENDING ===== */
body.sort((a,b)=> Number(b[0]||0)-Number(a[0]||0));

/* ===== DEFAULT MODE LIMIT ===== */
if(!filterActive){
  body = body.slice(0,250);
}

  rows.splice(0, rows.length, ...[header,...body]);

}

/* ================= CREATE TABLE ================= */
function createTable(sheetName, rows){

  const tableDiv = document.getElementById("multiformTable");
  if(!tableDiv) return;

  tableDiv.innerHTML = "";

  const table = document.createElement("table");
  table.className = "table";

  const headers = sheetHeaders[sheetName] || [];

  const thead = document.createElement("thead");
  const trHead = document.createElement("tr");

  headers.forEach(h=>{
    const th = document.createElement("th");
    th.textContent = h;
    trHead.appendChild(th);
  });

  thead.appendChild(trHead);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");

  rows.forEach((row,i)=>{
    if(i===0) return;

    const tr = document.createElement("tr");

    headers.forEach((_,col)=>{
      const td = document.createElement("td");
      td.textContent = row[col] || "";
      tr.appendChild(td);
    });

    const type = (row[2] || "").toUpperCase();

    if(type==="RECEIPT"||type==="X"||type==="REJECT"||type==="CANCELED"){
      tr.style.color="#ff0000";
      tr.style.backgroundColor="#ffe6e6";
    }
    else if(type==="PANDING"){ tr.style.color="blue"; }
    else if(type==="LOAD"){ tr.style.backgroundColor="#cce5ff"; }
    else if(type==="UNLOAD"){ tr.style.backgroundColor="#ccffcc"; }
    else if(type==="BANK"){ tr.style.color="#ff0000"; }
    else if(type==="COMPLETED"){ tr.style.color="green"; }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  tableDiv.appendChild(table);

}

/* ================= LEDGER LIST ================= */
function loadLedgerList(rows){

  const set = new Set();

  rows.forEach((row,i)=>{
    if(i===0) return;
    if(row[4]) set.add(row[4]);
  });

  ledgerList = [...set].sort();

}

/* ================= REFF LIST ================= */
function loadReffPOList(rows){

  const activeForm = getActiveForm();
  if(!activeForm) return;

  const ledgerInput = activeForm.querySelector("#DpSRRSearch");
  const selectedLedger = ledgerInput?.value || "";

  const set = new Set();

  rows.forEach((row,i)=>{

    if(i===0) return;

    const ledger = row[4] || "";
    const reff   = row[6] || "";

    if(reff){

      if(selectedLedger){
        if(ledger === selectedLedger){
          set.add(reff);
        }
      }
      else{
        set.add(reff);
      }

    }

  });

  reffPOList = [...set].sort();

}

/* ================= LEDGER DROPDOWN ================= */
function filterLedgerDropdown(){

  const activeForm = getActiveForm();
  if(!activeForm) return;

  const input = activeForm.querySelector("#DpSRRSearch");
  const dropdown = activeForm.querySelector(".ledgerDropdown");

  const value = input.value.toLowerCase();
  dropdown.innerHTML="";
  ledgerIndex=-1;

  const filtered = ledgerList.filter(v => v.toLowerCase().includes(value));

  filtered.forEach(item=>{

    const div=document.createElement("div");
    div.className="ledger-item";
    div.textContent=item;

    div.onclick=()=>{
      input.value=item;
      selectedMFTLedger=item;
      dropdown.style.display="none";
       loadReffPOList(sheetCache);   // 🔹 refresh reff dropdown
    };

    dropdown.appendChild(div);

  });

  const newBtn=document.createElement("div");
  newBtn.className="ledger-item ledger-new";
  newBtn.textContent="Create New ➕";

newBtn.onclick=()=>{
  const newLedger=prompt("Enter New Ledger Name");

  if(newLedger){

    input.value=newLedger;
    selectedMFTLedger=newLedger;

    ledgerList.push(newLedger);
    ledgerList.sort();

    dropdown.style.display="none";

  }

};

  dropdown.appendChild(newBtn);
  dropdown.style.display="block";

}

/* ================= REFF DROPDOWN ================= */
function filterReffDropdown(){

  const activeForm = getActiveForm();
  if(!activeForm) return;

  const input = activeForm.querySelector("#msaf94");
  const dropdown = activeForm.querySelector(".reffPODropdown");

  const value = input.value.toLowerCase();
  dropdown.innerHTML="";
  reffIndex=-1;

  const filtered = reffPOList.filter(v => v.toLowerCase().includes(value));

  filtered.forEach(item=>{

    const div=document.createElement("div");
    div.className="ledger-item";
    div.textContent=item;

    div.onclick=()=>{
      input.value=item;
      selectedReffPO=item;
      dropdown.style.display="none";
    };

    dropdown.appendChild(div);

  });

  const newBtn=document.createElement("div");
  newBtn.className="ledger-item ledger-new";
  newBtn.textContent="Create New ➕";

 newBtn.onclick=()=>{
  const newVal=prompt("Enter New Reff / PO");

  if(newVal){

    input.value=newVal;
    selectedReffPO=newVal;

    reffPOList.push(newVal);
    reffPOList.sort();

    dropdown.style.display="none";

  }

};

  dropdown.appendChild(newBtn);
  dropdown.style.display="block";

}

/* ================= GLOBAL FILTER ================= */
function applyMFTFilters(){
  loadActiveTable();
}

/* ================= DATE FORMAT ================= */
function formatDate(dateStr){

  if(!dateStr) return "";

  const d = new Date(dateStr);

  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return d.getDate()+"-"+months[d.getMonth()]+"-"+d.getFullYear();

}

/* ================= TIMESTAMP ================= */
function getTimestamp(){

  const d=new Date();

  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  let hours=d.getHours();
  const minutes=d.getMinutes().toString().padStart(2,"0");
  const ampm=hours>=12?"PM":"AM";

  hours=hours%12;
  hours=hours?hours:12;

  return `${d.getDate()}-${months[d.getMonth()]}-${d.getFullYear()} ${hours}:${minutes} ${ampm}`;

}

/* ================= PRINT ================= */
document.getElementById("MFTPrint")?.addEventListener("click", function(){

  const table=document.querySelector("#multiformTable table:last-child");
  if(!table) return;

  const startDate=formatDate(document.getElementById("startMFTDate")?.value);
  const endDate=formatDate(document.getElementById("endMFTDate")?.value);

  const totalsHTML=document.getElementById("formdTotalsBox")?.innerHTML || "";
  const timeStamp=getTimestamp();

  const win=window.open("","_blank","width=900,height=700");

  win.document.write(`

  <html>
  <head>
  <title>Print</title>
  <style>
  body{font-family:Arial;padding:20px}
  table{border-collapse:collapse;width:100%}
  th,td{border:1px solid #000;padding:6px}
  th{background:#f2f2f2}
  .header{display:flex;justify-content:space-between}
  </style>
  </head>

  <body>

  <div class="header">
  <h2>Display Report</h2>
  <div>${timeStamp}</div>
  </div>

  <div><b>From:</b> ${startDate} &nbsp;&nbsp; <b>To:</b> ${endDate}</div>

  <br>

  ${totalsHTML}

  <br>

  ${table.outerHTML}

  </body>
  </html>

  `);

  win.document.close();
  win.print();

});

/* ================= EVENTS ================= */

document.getElementById("startMFTDate")?.addEventListener("change", applyMFTFilters);
